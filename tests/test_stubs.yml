- case: adapter_subclass
  mypy_config: |
    [mypy]
    plugins = mypy_django_plugin.main

    [mypy.plugins.django-stubs]
    django_settings_module = telepath.test_settings
  main: |
    from telepath import Adapter, BaseAdapter, register, AdapterRegistry, JSContextBase

    class MyObj:
        name: str

    class MyAdapter(Adapter):
        js_constructor = "myapp.MyObj"

        def js_args(self, obj: MyObj) -> list[object]:
            return [obj.name]

    adapter = MyAdapter()
    registry = AdapterRegistry()
    registry.register(adapter, MyObj)

