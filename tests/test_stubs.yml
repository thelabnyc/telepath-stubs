- case: base_adapter_build_node
  mypy_config: |
    [mypy]
    plugins = mypy_django_plugin.main

    [mypy.plugins.django-stubs]
    django_settings_module = telepath.test_settings
  main: |
    from telepath import BaseAdapter, ValueContext, JSContextBase, AdapterRegistry, Node

    class MyContext(JSContextBase):
        registry = AdapterRegistry()
        telepath_js_path = "telepath/js/telepath.js"

    parent = MyContext()
    vc = ValueContext(parent)
    adapter = BaseAdapter()
    node: Node = adapter.build_node(42, vc)
